<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Abismo das Flores</title>

<style>
body{
  margin:0;
  font-family: Arial;
  color:white;
  text-align:center;
  background:#14001a;
  transition:1s;
}

/* telas */
.tela{display:none;padding:30px;}
.ativa{display:block;}

h1{margin-top:20px;}

button{
  display:block;
  margin:10px auto;
  padding:12px;
  width:250px;
  border:none;
  border-radius:12px;
  background:#7b2cbf;
  color:white;
  font-size:15px;
  cursor:pointer;
}

/* temas */
.tema-vaidade{background:linear-gradient(#fff3b0,#ffd700);}
.tema-desprezo{background:#2b2b2b;}
.tema-inveja{background:#0b6623;}
.tema-culpa{background:#0d1b2a;}
.tema-inseguranca{background:#3a0ca3;}
.tema-vinganca{background:#5a0000;}
.tema-odio{background:#000000;}
.tema-obsessao{background:#4a001f;}

@keyframes impacto{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

#tipo{
  animation:impacto 0.6s;
}

/* estrelinhas */
.estrela{
  position:fixed;
  width:4px;height:4px;
  background:white;
  border-radius:50%;
  animation:piscar 2s;
}

@keyframes piscar{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}
</style>
</head>

<body>

<h1>🌸 Abismo das Flores</h1>

<div id="inicio" class="tela ativa">
  <h2>Descubra seu Keearem</h2>
  <button onclick="iniciar()">Começar</button>
</div>

<div id="quiz" class="tela">
  <h2 id="pergunta"></h2>

  <button onclick="responder(2)">Concordo plenamente</button>
  <button onclick="responder(1)">Concordo</button>
  <button onclick="responder(0)">Neutro</button>
  <button onclick="responder(-1)">Discordo</button>
  <button onclick="responder(-2)">Discordo totalmente</button>
</div>

<div id="resultado" class="tela">
  <h2 id="tipo"></h2>
  <p id="descricao"></p>
  <p id="porcentagem"></p>
</div>

<audio id="bgm" loop></audio>
<audio id="batida"></audio>
<audio id="voz"></audio>

<script>
let perguntas = [
{texto:"Você gosta de ser o centro das atenções?",tipo:"vaidade"},
{texto:"Você dificilmente confia nas pessoas?",tipo:"desprezo"},
{texto:"Você se compara com os outros com frequência?",tipo:"inveja"},
{texto:"Você se culpa por coisas do passado?",tipo:"culpa"},
{texto:"Você muda de opinião para agradar?",tipo:"inseguranca"},
{texto:"Você acredita que tudo deve ser pago?",tipo:"vinganca"},
{texto:"Você odeia falsidade?",tipo:"odio"},
{texto:"Quando quer algo, você não para até conseguir?",tipo:"obsessao"}
];

let atual=0;

let pontos={
vaidade:0,desprezo:0,inveja:0,culpa:0,
inseguranca:0,vinganca:0,odio:0,obsessao:0
};

function trocarTela(id){
document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
document.getElementById(id).classList.add("ativa");
}

function iniciar(){
trocarTela("quiz");

let bgm=document.getElementById("bgm");
bgm.src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c7b0b3c0e.mp3";
bgm.volume=0.3;
bgm.play();

mostrarPergunta();
}

function mostrarPergunta(){
document.getElementById("pergunta").innerText=perguntas[atual].texto;
}

function responder(valor){
let tipo=perguntas[atual].tipo;
pontos[tipo]+=valor;

atual++;

if(atual<perguntas.length){
mostrarPergunta();
}else{
resultado();
}
}

function resultado(){
trocarTela("resultado");

let total=0;
for(let k in pontos){total+=Math.max(0,pontos[k]);}

let vencedor=Object.keys(pontos).reduce((a,b)=>pontos[a]>pontos[b]?a:b);

let porcentagem="";
for(let k in pontos){
let p=Math.max(0,pontos[k]);
let perc=((p/total)*100)||0;
porcentagem+=k+": "+perc.toFixed(0)+"%<br>";
}

document.getElementById("porcentagem").innerHTML=porcentagem;

let descricoes={
vaidade:"Você precisa ser visto e admirado.",
desprezo:"Você observa o mundo com distância e crítica.",
inveja:"Você transforma comparação em ambição.",
culpa:"Você carrega o peso do mundo.",
inseguranca:"Você vive em dúvida constante.",
vinganca:"Você acredita que tudo tem retorno.",
odio:"Você prefere destruir do que fingir.",
obsessao:"Você vai até o fim, custe o que custar."
};

document.getElementById("tipo").innerText=vencedor.toUpperCase();
document.getElementById("descricao").innerText=descricoes[vencedor];

let bgm=document.getElementById("bgm");
let batida=document.getElementById("batida");
let voz=document.getElementById("voz");

bgm.pause();

batida.src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c7b0b3c0e.mp3";
batida.play();

setTimeout(()=>{
document.body.className="tema-"+vencedor;

bgm.src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c7b0b3c0e.mp3";
bgm.play();

voz.src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c7b0b3c0e.mp3";
voz.play();

criarEstrelas();
},800);
}

function criarEstrelas(){
for(let i=0;i<20;i++){
let e=document.createElement("div");
e.className="estrela";
e.style.left=Math.random()*100+"vw";
e.style.top=Math.random()*100+"vh";
document.body.appendChild(e);
setTimeout(()=>e.remove(),2000);
}
}
</script>

</body>
</html>
